<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>TabStack</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".25"/>
      </svg>
    </div>
    <span class="title">TabStack</span>
    <span class="tab-count" id="tabCount"></span>
  </div>

  <div class="body">
    <div class="current-preview hidden" id="currentPreview">
      <div class="preview-fav" id="previewFav"></div>
      <span class="preview-title" id="previewTitle"></span>
      <span class="preview-domain" id="previewDomain"></span>
    </div>

    <button class="action-btn primary" id="btnSaveCurrent">
      <span class="btn-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 2v8M3.5 6.5L7 10l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="btn-body">
        <span class="btn-title" data-i18n="saveCurrent"></span>
        <span class="btn-sub" data-i18n="saveCurrentSub"></span>
      </span>
      <span class="kbd">⌘⇧1</span>
    </button>

    <button class="action-btn" id="btnSaveAll">
      <span class="btn-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v7M3.5 5L7 8.5 10.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 5v7M3.5 9L7 12.5 10.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".45"/>
        </svg>
      </span>
      <span class="btn-body">
        <span class="btn-title" data-i18n="saveAll"></span>
        <span class="btn-sub" id="saveAllSub"></span>
      </span>
      <span class="kbd">⌘⇧2</span>
    </button>

    <div class="divider"></div>

    <button class="action-btn restore" id="btnRestore">
      <span class="btn-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7a5 5 0 1 0 1.5-3.5L2 2v3h3L3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="btn-body">
        <span class="btn-title" data-i18n="restoreLast"></span>
        <span class="btn-sub" id="restoreSub"></span>
      </span>
    </button>

    <button class="action-btn danger" id="btnDiscard">
      <span class="btn-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.75 7.5h6.5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="btn-body">
        <span class="btn-title" data-i18n="discardCurrent"></span>
        <span class="btn-sub" data-i18n="discardCurrentSub"></span>
      </span>
    </button>
  </div>

  <div class="footer">
    <button class="foot-btn" id="btnList">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x="1" y="1" width="11" height="2.5" rx="1" fill="currentColor" opacity=".9"/>
        <rect x="1" y="5.25" width="11" height="2.5" rx="1" fill="currentColor" opacity=".6"/>
        <rect x="1" y="9.5" width="7" height="2.5" rx="1" fill="currentColor" opacity=".35"/>
      </svg>
      <span data-i18n="listLink"></span>
    </button>
    <button class="foot-btn" id="btnSettings">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <circle cx="6.5" cy="6.5" r="1.8" stroke="currentColor" stroke-width="1.2"/>
        <path d="M6.5 1v1.2M6.5 10.8V12M1 6.5h1.2M10.8 6.5H12M2.4 2.4l.85.85M9.75 9.75l.85.85M9.75 3.25l-.85.85M3.25 9.75l-.85.85" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
      <span data-i18n="settingsLink"></span>
    </button>
  </div>

  <div class="overlay hidden" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 3l7 12H2L9 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 8v3M9 13h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="confirm-title" data-i18n="confirmTitle"></div>
      <div class="confirm-body" id="confirmBody"></div>
      <label class="check-row">
        <input type="checkbox" id="dontAskAgain">
        <span data-i18n="dontAskAgain"></span>
      </label>
      <div class="confirm-btns">
        <button class="cbtn cancel" id="confirmCancel" data-i18n="cancel"></button>
        <button class="cbtn ok" id="confirmOk" data-i18n="confirmOk"></button>
      </div>
    </div>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
